<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FoodWaste">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Food Waste Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --blue:   #2563eb;
  --blue-light: #eff6ff;
  --red:    #ef4444;
  --green:  #22c55e;
  --gray:   #f3f4f6;
  --border: #e5e7eb;
  --text:   #111827;
  --muted:  #6b7280;
  --white:  #ffffff;
  --radius: 12px;
  --c1: #4C72B0; --c2: #DD8452; --c3: #55A868; --c4: #C44E52;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: #f0f4f8; color: var(--text); min-height: 100vh; }

/* header */
.header { background: var(--blue); color: #fff; padding: 1rem 1rem 0.75rem;
          display: flex; align-items: center; justify-content: space-between;
          position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size: 17px; font-weight: 600; }
.header p  { font-size: 11px; opacity: .8; margin-top: 2px; }
.btn-header { background: rgba(255,255,255,.2); border: none; color: #fff;
              border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

/* tabs */
.tabs { display: flex; gap: 6px; padding: 12px; overflow-x: auto; background: var(--white);
        border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
.tab { flex-shrink: 0; font-size: 13px; padding: 5px 14px; border-radius: 20px;
       border: 1.5px solid var(--border); background: var(--white); color: var(--muted); cursor: pointer;
       transition: all .15s; white-space: nowrap; }
.tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 500; }

/* pages */
.page { display: none; padding: 12px; }
.page.active { display: block; }

/* cards */
.card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border);
        padding: 1rem; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px;
              display: flex; align-items: center; gap: 6px; }

/* metrics */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.metric { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border);
          padding: .85rem 1rem; }
.metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 600; color: var(--text); }
.metric-unit  { font-size: 12px; color: var(--muted); font-weight: 400; }

/* source rows */
.source-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center;
              gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.source-row:last-child { border-bottom: none; padding-bottom: 0; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.source-name { font-size: 13px; color: var(--text); }
.source-sub  { font-size: 11px; color: var(--muted); }
.net-badge { font-size: 14px; font-weight: 600; color: var(--blue); white-space: nowrap; }

/* form */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: flex;
              align-items: center; gap: 6px; }
.form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
              border-radius: 8px; font-size: 15px; background: var(--white);
              color: var(--text); outline: none; transition: border-color .15s; }
.form-input:focus { border-color: var(--blue); }
.form-input[type=number] { -moz-appearance: textfield; }

/* buttons */
.btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px;
       font-weight: 600; cursor: pointer; transition: opacity .15s; }
.btn:active { opacity: .8; }
.btn-primary { background: var(--blue); color: #fff; }
.btn-danger  { background: var(--red);  color: #fff; margin-top: 8px; }
.btn-outline { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }

/* day list */
.day-item { display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 8px; cursor: pointer;
            transition: background .1s; }
.day-item:active { background: var(--gray); }
.day-info { flex: 1; }
.day-label { font-size: 15px; font-weight: 500; }
.day-date  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.day-total { font-size: 15px; font-weight: 600; color: var(--blue); white-space: nowrap; margin: 0 10px; }
.day-arrow { color: var(--muted); font-size: 18px; }

/* chart */
.chart-wrap { position: relative; width: 100%; height: 240px; }

/* nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white);
              border-top: 1px solid var(--border); display: flex;
              padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 8px 0; cursor: pointer; color: var(--muted);
            font-size: 10px; gap: 3px; transition: color .15s; border: none;
            background: none; }
.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 22px; line-height: 1; }

/* install banner */
.install-banner { background: var(--blue-light); border: 1.5px solid #bfdbfe;
                  border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
                  display: none; }
.install-banner.show { display: block; }

/* toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
         background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 20px;
         font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s;
         white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; }

.content { padding-bottom: 80px; }
.empty { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 14px; }
.tag { display: inline-block; background: var(--blue-light); color: var(--blue);
       font-size: 11px; padding: 2px 8px; border-radius: 20px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🗑 Food Waste Tracker</h1>
    <p id="header-sub">บันทึกเศษอาหารรายวัน</p>
  </div>
</div>

<div class="content">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div id="install-banner" class="install-banner">
      <p style="font-size:13px;font-weight:600;margin-bottom:4px;">📱 เพิ่มลงหน้าจอหลัก</p>
      <p style="font-size:12px;color:var(--muted);">แตะ <b>Share</b> → <b>Add to Home Screen</b> (iOS)<br>หรือแตะ <b>⋮</b> → <b>Add to Home Screen</b> (Android)</p>
    </div>

    <div class="metrics" id="home-metrics"></div>

    <div class="card">
      <div class="card-title">📊 กราฟเปรียบเทียบ</div>
      <div class="chart-wrap">
        <canvas id="homeChart" role="img" aria-label="Bar chart of food waste by day"></canvas>
      </div>
    </div>

    <div style="margin-bottom:12px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;">ประวัติทั้งหมด</div>
      <div id="day-list"></div>
    </div>
  </div>

  <!-- ADD PAGE -->
  <div class="page" id="page-add">
    <div class="card">
      <div class="card-title">📝 บันทึกข้อมูลวันใหม่</div>

      <div class="form-group">
        <label class="form-label">ชื่อวัน / วันที่</label>
        <input class="form-input" id="input-label" type="text" placeholder="เช่น Day 2 หรือ 21 มิ.ย." />
      </div>

      <div id="source-inputs"></div>

      <div style="background:var(--gray);border-radius:8px;padding:10px 12px;margin:12px 0;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:2px;">รวมสุทธิ (หักถังเปล่า 1 kg)</div>
        <div style="font-size:22px;font-weight:700;color:var(--blue);" id="live-total">0.00 kg</div>
      </div>

      <button class="btn btn-primary" onclick="saveDay()">💾 บันทึก</button>
    </div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div id="history-list"></div>
  </div>

  <!-- DETAIL PAGE (hidden nav) -->
  <div class="page" id="page-detail">
    <div id="detail-content"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="showPage('home')">
    <span class="nav-icon">🏠</span>หน้าหลัก
  </button>
  <button class="nav-item" id="nav-add" onclick="showPage('add')">
    <span class="nav-icon">➕</span>บันทึก
  </button>
  <button class="nav-item" id="nav-history" onclick="showPage('history')">
    <span class="nav-icon">📋</span>ประวัติ
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────
const SOURCES = [
  { name: "โรงอาหารประถม",      color: "#4C72B0" },
  { name: "แผนกเข้มข้น",        color: "#DD8452" },
  { name: "โรงอาหารใหญ่ ถัง 1", color: "#55A868" },
  { name: "โรงอาหารใหญ่ ถัง 2", color: "#C44E52" },
];
const EMPTY = 1.0;
const KEY   = "fwt_v2";

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) { return []; }
}
function save(days) {
  localStorage.setItem(KEY, JSON.stringify(days));
}

let days      = load();
let editIndex = null;
let homeChart = null;

// ── Toast ─────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Pages ─────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  if (name === 'home')    renderHome();
  if (name === 'history') renderHistory();
  if (name === 'add')     resetForm();
}

// ── Home ──────────────────────────────────────────────
function renderHome() {
  renderMetrics();
  renderDayList();
  renderChart();
}

function netTotal(day) {
  return day.weights.reduce((s, w) => s + Math.max(0, w - EMPTY), 0);
}

function renderMetrics() {
  const nets = days.map(netTotal);
  const total = nets.reduce((a,b) => a+b, 0);
  const avg   = nets.length ? total/nets.length : 0;
  const maxI  = nets.indexOf(Math.max(...nets));
  document.getElementById('home-metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">รวมทุกวัน</div>
      <div class="metric-value">${total.toFixed(2)}<span class="metric-unit"> kg</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">เฉลี่ยต่อวัน</div>
      <div class="metric-value">${avg.toFixed(2)}<span class="metric-unit"> kg</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">จำนวนวัน</div>
      <div class="metric-value">${days.length}<span class="metric-unit"> วัน</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">วันที่มากสุด</div>
      <div class="metric-value" style="font-size:15px;">${days[maxI]?.label || '-'}</div>
    </div>
  `;
}

function renderDayList() {
  const el = document.getElementById('day-list');
  if (!days.length) {
    el.innerHTML = '<div class="empty">ยังไม่มีข้อมูล<br>กด ➕ เพื่อบันทึกวันแรก</div>';
    return;
  }
  el.innerHTML = [...days].reverse().map((d, ri) => {
    const i = days.length - 1 - ri;
    const net = netTotal(d);
    return `<div class="day-item" onclick="showDetail(${i})">
      <div class="day-info">
        <div class="day-label">${d.label}</div>
        <div class="day-date">${d.date}</div>
      </div>
      <div class="day-total">${net.toFixed(2)} kg</div>
      <div class="day-arrow">›</div>
    </div>`;
  }).join('');
}

function renderChart() {
  if (!days.length) return;
  if (homeChart) homeChart.destroy();
  const labels = days.map(d => d.label);
  const datasets = SOURCES.map((s, si) => ({
    label: s.name,
    data: days.map(d => parseFloat(Math.max(0, d.weights[si] - EMPTY).toFixed(2))),
    backgroundColor: s.color + 'CC',
    borderColor: s.color,
    borderWidth: 1,
    borderRadius: 4,
  }));
  homeChart = new Chart(document.getElementById('homeChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 30, autoSkip: false } },
        y: { beginAtZero: true, title: { display: true, text: 'kg (สุทธิ)', font: { size: 10 } } }
      }
    }
  });
}

// ── Detail ────────────────────────────────────────────
function showDetail(i) {
  const d = days[i];
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const rows = SOURCES.map((s, si) => {
    const net = Math.max(0, d.weights[si] - EMPTY);
    return `<div class="source-row">
      <span class="dot" style="background:${s.color}"></span>
      <div>
        <div class="source-name">${s.name}</div>
        <div class="source-sub">รวม ${d.weights[si].toFixed(2)} kg − ถัง ${EMPTY} kg</div>
      </div>
      <div class="net-badge">${net.toFixed(2)} kg</div>
    </div>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:12px 0 8px;">
      <button onclick="showPage('home')" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--blue);">‹</button>
      <div>
        <div style="font-size:17px;font-weight:600;">${d.label}</div>
        <div style="font-size:12px;color:var(--muted);">${d.date}</div>
      </div>
    </div>
    <div class="metrics" style="margin-bottom:12px;">
      <div class="metric">
        <div class="metric-label">รวมสุทธิ</div>
        <div class="metric-value">${netTotal(d).toFixed(2)}<span class="metric-unit"> kg</span></div>
      </div>
      <div class="metric">
        <div class="metric-label">จำนวนแหล่ง</div>
        <div class="metric-value">${SOURCES.length}<span class="metric-unit"> แหล่ง</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">น้ำหนักแต่ละแหล่ง</div>
      ${rows}
    </div>
    <button class="btn btn-outline" onclick="editDay(${i})" style="margin-bottom:8px;">✏️ แก้ไขข้อมูล</button>
    <button class="btn btn-danger"  onclick="deleteDay(${i})">🗑 ลบวันนี้</button>
  `;
  document.getElementById('page-detail').classList.add('active');
}

// ── History ───────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!days.length) {
    el.innerHTML = '<div class="empty">ยังไม่มีข้อมูล</div>'; return;
  }
  el.innerHTML = [...days].reverse().map((d, ri) => {
    const i = days.length - 1 - ri;
    const rows = SOURCES.map((s, si) => {
      const net = Math.max(0, d.weights[si] - EMPTY);
      return `<div class="source-row">
        <span class="dot" style="background:${s.color}"></span>
        <div class="source-name">${s.name}</div>
        <div class="net-badge">${net.toFixed(2)} kg</div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">${d.label} <span class="tag">${d.date}</span></div>
      ${rows}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
                  display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--muted);">รวมสุทธิ</span>
        <span style="font-size:16px;font-weight:700;color:var(--blue);">${netTotal(d).toFixed(2)} kg</span>
      </div>
    </div>`;
  }).join('');
}

// ── Add / Edit Form ───────────────────────────────────
function resetForm() {
  editIndex = null;
  document.getElementById('input-label').value = 'Day ' + (days.length + 1);
  buildSourceInputs([0, 0, 0, 0]);
  updateLiveTotal();
}

function buildSourceInputs(vals) {
  document.getElementById('source-inputs').innerHTML = SOURCES.map((s, i) => `
    <div class="form-group">
      <label class="form-label">
        <span class="dot" style="background:${s.color}"></span> ${s.name}
      </label>
      <input class="form-input" id="w${i}" type="number" step="0.01" min="0"
             value="${vals[i]}" placeholder="น้ำหนักรวม (kg)" oninput="updateLiveTotal()" />
    </div>
  `).join('');
}

function updateLiveTotal() {
  let sum = 0;
  SOURCES.forEach((_, i) => {
    const v = parseFloat(document.getElementById('w'+i)?.value) || 0;
    sum += Math.max(0, v - EMPTY);
  });
  document.getElementById('live-total').textContent = sum.toFixed(2) + ' kg';
}

function saveDay() {
  const label = document.getElementById('input-label').value.trim() || ('Day ' + (days.length+1));
  const weights = SOURCES.map((_, i) => parseFloat(document.getElementById('w'+i).value) || 0);
  const now = new Date().toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  if (editIndex !== null) {
    days[editIndex] = { label, date: now + ' (แก้ไข)', weights };
    editIndex = null;
    toast('✅ แก้ไขแล้ว');
  } else {
    days.push({ label, date: now, weights });
    toast('✅ บันทึกแล้ว');
  }
  save(days);
  showPage('home');
}

function editDay(i) {
  editIndex = i;
  const d = days[i];
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
  document.getElementById('nav-add').classList.add('active');
  document.getElementById('input-label').value = d.label;
  buildSourceInputs(d.weights);
  updateLiveTotal();
}

function deleteDay(i) {
  if (!confirm('ลบ "' + days[i].label + '" ?')) return;
  days.splice(i, 1);
  save(days);
  toast('🗑 ลบแล้ว');
  showPage('home');
}

// ── Install banner ────────────────────────────────────
window.addEventListener('load', () => {
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
  if (!isStandalone) {
    document.getElementById('install-banner').classList.add('show');
  }
  renderHome();
});

// ── Service Worker ────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
